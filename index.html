const initOneSignal = (clientId) => {
  try {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async (OneSignal) => {
      await OneSignal.init({ appId: ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin: true });
      if (clientId) {
        await OneSignal.login(clientId);
      }
    });
  } catch(e) { console.warn("OneSignal init failed", e); }
};

const sb = {
  h: { "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY },
  async get(table, params="") {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: this.h });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:"POST", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, filter, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
      method:"PATCH", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async rpc(fn, body) {
    const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
      method:"POST", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ── COMPOSANTS UI ──────────────────────────────────────────────────

function Toast({ msg, icon="✓", onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast"><span>{icon}</span>{msg}</div>;
}

function Spinner({ size=32, color="#F5A623" }) {
  return <div style={{width:size,height:size,border:`3px solid ${color}33`,borderTopColor:color,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>;
}

function Loader({ msg="Chargement..." }) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",gap:14}}>
      <Spinner size={36}/>
      <div style={{fontSize:13,color:"#5A6170"}}>{msg}</div>
    </div>
  );
}

function Sheet({ title, onClose, children, noPad=false }) {
  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{title}</span>
          <button className="sheet-close" onClick={onClose}>✕</button>
        </div>
        <div style={noPad?{}:{padding:"18px 20px 8px"}}>{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children, error }) {

function StatusBadge({ statut }) {

  return <span className="c-badge" style={{background:s.bg,color:s.color}}>{s.icon} {s.label}</span>;
}

function OfflineBanner() {
  const [offline, setOffline] = useState(!navigator.onLine);
  useEffect(() => {
    const on=()=>setOffline(false), off=()=>setOffline(true);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return ()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);
  if(!offline) return null;
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#dc2626",color:"#fff",textAlign:"center",padding:"8px 16px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      <span>📵</span> Hors ligne — Vérifiez votre connexion
    </div>
  );
}

// AUTH — INSCRIPTION / CONNEXION
// ═══════════════════════════════════════════════════════════════════
function AuthPage({ onAuth }) {
  const [tab, setTab]       = useState(URL_CODE ? "register" : "login");    // login | register
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]       = useState({type:"",text:""});

  // Login state
  const [lTel,  setLTel]  = useState("");
  const [lPass, setLPass] = useState("");

  // Register state
  const [rPrenom, setRPrenom] = useState("");
  const [rNom,    setRNom]    = useState("");
  const [rTel,    setRTel]    = useState("");
  const [rPass,   setRPass]   = useState("");
  const [rPass2,  setRPass2]  = useState("");
  const [rCode,   setRCode]   = useState(URL_CODE || "");

  const err  = t => setMsg({type:"error",text:t});
  const succ = t => setMsg({type:"success",text:t});
  const clr  = () => setMsg({type:"",text:""});

  const MsgBox = () => msg.text ? (
    <div style={{background:msg.type==="error"?"rgba(239,68,68,.1)":"rgba(34,197,94,.1)",border:`1px solid ${msg.type==="error"?"rgba(239,68,68,.3)":"rgba(34,197,94,.3)"}`,borderRadius:12,padding:"11px 14px",marginBottom:14,color:msg.type==="error"?"#EF4444":"#22C55E",fontSize:13,fontWeight:500}}>
      {msg.type==="error"?"⚠️ ":"✓ "}{msg.text}
    </div>
  ) : null;

  // ── CONNEXION ──────────────────────────────────────────────────
  const doLogin = async () => {
    if(!lTel||!lPass){ err("Téléphone et mot de passe requis."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("clients", `telephone=eq.${encodeURIComponent(lTel.trim())}&select=id,nom,prenom,telephone`);
      if(!rows?.length){ err("Numéro de téléphone introuvable."); setLoading(false); return; }
      const client = rows[0];
      // Vérifier le mot de passe
      const pwRows = await sb.get("clients", `id=eq.${client.id}&password_hash=eq.${encodeURIComponent(lPass)}&select=id`);
      if(!pwRows?.length){ err("Mot de passe incorrect."); setLoading(false); return; }
      // Charger les affiliations
      const affs = await sb.get("client_affiliations", `client_id=eq.${client.id}&actif=eq.true&select=restaurant_id,affiliated_at`);
      if(!affs?.length){ err("Aucun restaurant associé. Inscrivez-vous avec un code restaurant."); setLoading(false); return; }
      // Charger les infos restaurants
      const rids = affs.map(a=>a.restaurant_id);
      const restos = await sb.get("restaurants", `id=in.(${rids.join(",")})&select=id,code,nom,plan,orange_money_numero`);
      const session = { client, affiliations: affs, restaurants: restos, activeRestaurantId: restos[0]?.id };
      setSession(session);
      initOneSignal(client.id);
      onAuth(session);
    } catch(e){ err("Erreur de connexion : "+e.message); }
    setLoading(false);
  };

  // ── INSCRIPTION ────────────────────────────────────────────────
  const doRegister = async () => {
    if(!rPrenom||!rNom||!rTel||!rPass||!rCode){ err("Tous les champs sont obligatoires."); return; }
    if(rPass!==rPass2){ err("Les mots de passe ne correspondent pas."); return; }
    if(rPass.length<4){ err("Mot de passe trop court (min. 4 caractères)."); return; }
    if(!rCode.trim().toUpperCase().startsWith("NXS")){ err("Code restaurant invalide (format NXS-XXXX)."); return; }
    setLoading(true); clr();
    try {
      // Vérifier le code restaurant
      const restos = await sb.get("restaurants", `code=eq.${encodeURIComponent(rCode.trim().toUpperCase())}&select=id,nom,plan,statut_abo,date_expiration,orange_money_numero`);
      if(!restos?.length){ err("Code restaurant introuvable. Vérifiez le code NXS-XXXX."); setLoading(false); return; }
      const resto = restos[0];
      // Vérifier que le téléphone n'existe pas déjà

// AFFILIATION — Ajouter un restaurant
// ═══════════════════════════════════════════════════════════════════
function AffiliationSheet({ session, onDone, onClose }) {
  const [code, setCode]   = useState(URL_CODE||"");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]     = useState({type:"",text:""});

  const doAffiliate = async () => {
    if(!code.trim()){ setMsg({type:"error",text:"Code restaurant requis."}); return; }
    setLoading(true); setMsg({type:"",text:""});
    try {
      const restos = await sb.get("restaurants", `code=eq.${encodeURIComponent(code.trim().toUpperCase())}&select=id,nom,plan,orange_money_numero`);
      if(!restos?.length){ setMsg({type:"error",text:"Code restaurant introuvable."}); setLoading(false); return; }
      const resto = restos[0];
      // Vérifier si déjà affilié
      const existing = await sb.get("client_affiliations", `client_id=eq.${session.client.id}&restaurant_id=eq.${resto.id}&select=id,actif`);
      if(existing?.length) {
        if(existing[0].actif){ setMsg({type:"error",text:"Vous êtes déjà affilié à ce restaurant."}); setLoading(false); return; }
        // Réactiver
        await sb.patch("client_affiliations",`id=eq.${existing[0].id}`,{actif:true});
      } else {
        await sb.post("client_affiliations",{id:uid(),client_id:session.client.id,restaurant_id:resto.id,affiliated_at:new Date().toISOString(),actif:true});
      }
      onDone(resto);
    } catch(e){ setMsg({type:"error",text:e.message}); }
    setLoading(false);
  };

  return (
    <Sheet title="Rejoindre un restaurant" onClose={onClose}>
      {msg.text && <div style={{background:msg.type==="error"?"rgba(239,68,68,.1)":"rgba(34,197,94,.1)",border:`1px solid ${msg.type==="error"?"rgba(239,68,68,.3)":"rgba(34,197,94,.3)"}`,borderRadius:12,padding:"10px 14px",marginBottom:14,color:msg.type==="error"?"#EF4444":"#22C55E",fontSize:13}}>{msg.text}</div>}
      <Field label="Code restaurant">
        <input className="c-inp" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="NXS-XXXX" style={{letterSpacing:"0.1em",fontWeight:700}}/>
      </Field>
      <div style={{marginBottom:14}}>
        <button className="c-btn" onClick={doAffiliate} disabled={loading}>{loading?"Recherche...":"S'affilier"}</button>
      </div>
      <button className="c-btn c-btn-ghost" onClick={onClose}>Annuler</button>
    </Sheet>
  );
}

// MENU SCREEN
// ═══════════════════════════════════════════════════════════════════
function MenuScreen({ session, cart, onCartChange, onOpenCart }) {
  const [menu, setMenu]      = useState([]);
  const [categories, setCats] = useState([]);
  const [selCat, setSelCat]  = useState("all");
  const [loading, setLoading] = useState(true);
  const [search, setSearch]  = useState("");
  const [resto, setResto]    = useState(null);

  const rid = session.activeRestaurantId;

  useEffect(() => {
    if(!rid) return;
    setLoading(true);
    const r = session.restaurants?.find(r=>r.id===rid);
    setResto(r);
    // Charger le menu (table menu_items ou products selon l'existant)
    sb.get("menu_items", `restaurant_id=eq.${encodeURIComponent(rid)}&available=eq.true&order=category.asc,name.asc`)
      .then(items => {
        setMenu(items||[]);
        const cats = [...new Set((items||[]).map(i=>i.category).filter(Boolean))];
        setCats(cats);
        setLoading(false);
      })
      .catch(() => {
        // Fallback sur table 'products'
        sb.get("products", `restaurant_id=eq.${encodeURIComponent(rid)}&actif=eq.true&order=categorie.asc,nom.asc`)
          .then(items => {
            // Normaliser
            const normalized = (items||[]).map(p=>({id:p.id,name:p.nom,description:p.description,price:p.prix,category:p.categorie,image_url:p.image_url,service_id:p.service_id,available:p.actif}));
            setMenu(normalized);
            const cats = [...new Set(normalized.map(i=>i.category).filter(Boolean))];
            setCats(cats);
            setLoading(false);
          })
          .catch(()=>setLoading(false));
      });
  }, [rid]);

  const filtered = useMemo(() => menu.filter(item => {
    const matchCat = selCat==="all" || item.category===selCat;
    const matchSearch = !search || (item.name||"").toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  }), [menu,selCat,search]);

  const cartCount = cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal = cart.reduce((s,i)=>s+i.qty*i.price,0);

  const getQty = (id) => cart.find(c=>c.id===id)?.qty || 0;

  const changeQty = (item, delta) => {
    const cur = cart.find(c=>c.id===item.id);
    const newQty = (cur?.qty||0)+delta;
    let newCart;
    if(newQty<=0) newCart = cart.filter(c=>c.id!==item.id);
    else if(cur) newCart = cart.map(c=>c.id===item.id?{...c,qty:newQty}:c);
    else newCart = [...cart,{id:item.id,name:item.name,price:item.price,qty:1,service_id:item.service_id,category:item.category}];
    onCartChange(newCart);
  };

  return (
    <div style={{paddingBottom:140}}>
      {/* Restaurant header */}
      <div style={{background:"linear-gradient(180deg,rgba(245,166,35,.12) 0%,transparent 100%)",padding:"16px 20px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#F5A623,#D4891A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🍽</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:18,color:"#F0F2F8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{resto?.nom||"Restaurant"}</div>
            <div style={{fontSize:11,color:"#5A6170",marginTop:1}}>Menu en ligne</div>
          </div>
        </div>
        {/* Search */}
        <div style={{position:"relative",marginBottom:14}}>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#5A6170",fontSize:15}}>🔍</span>
          <input className="c-inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un plat..." style={{paddingLeft:40,paddingTop:10,paddingBottom:10,fontSize:14}}/>
        </div>
        {/* Catégories */}
        {categories.length>0 && (
          <div className="resto-scroll" style={{margin:"0 -20px",padding:"0 20px 14px"}}>
            {[{id:"all",l:"Tout"},...categories.map(c=>({id:c,l:c}))].map(cat=>(
              <button key={cat.id} onClick={()=>setSelCat(cat.id)} style={{flexShrink:0,padding:"7px 16px",borderRadius:20,border:selCat===cat.id?"none":"1px solid rgba(255,255,255,.1)",background:selCat===cat.id?"#F5A623":"rgba(255,255,255,.05)",color:selCat===cat.id?"#080A0F":"#9CA3B0",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
                {cat.l}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Menu items */}
      <div style={{padding:"16px 16px 0"}}>
        {loading && <Loader msg="Chargement du menu..."/>}
        {!loading && filtered.length===0 && (
          <div style={{textAlign:"center",padding:"48px 20px",color:"#5A6170",fontSize:14}}>
            {search?"Aucun résultat pour \""+search+"\"":"Aucun article disponible"}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {filtered.map(item => {
            const qty = getQty(item.id);
            return (
              <div key={item.id} className="menu-card" style={{animation:"fadeUp .3s ease"}}>
                {item.image_url ? (
                  <div style={{width:"100%",aspectRatio:"4/3",background:"#171A24",overflow:"hidden"}}>
                    <img src={item.image_url} alt={item.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>
                  </div>
                ) : (
                  <div style={{width:"100%",aspectRatio:"4/3",background:"linear-gradient(135deg,#171A24,#1E2230)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>🍴</div>
                )}
                <div style={{padding:"10px 10px 12px",flex:1,display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#F0F2F8",lineHeight:1.3}}>{item.name}</div>
                  {item.description && <div style={{fontSize:11,color:"#5A6170",lineHeight:1.4,flex:1}}>{item.description.slice(0,60)}{item.description.length>60?"…":""}</div>}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6}}>
                    <span style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:13,color:"#F5A623"}}>{fmt(item.price)}</span>
                    {qty===0 ? (
                      <button onClick={()=>changeQty(item,1)} style={{width:32,height:32,borderRadius:10,background:"#F5A623",border:"none",cursor:"pointer",color:"#080A0F",fontWeight:800,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    ) : (
                      <div className="qty-pill">
                        <button className="qty-btn" onClick={()=>changeQty(item,-1)}>−</button>
                        <span className="qty-val">{qty}</span>
                        <button className="qty-btn" onClick={()=>changeQty(item,1)}>+</button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Panier flottant */}
      {cartCount>0 && (
        <div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:468,zIndex:400,animation:"fadeUp .3s ease"}}>
          <button onClick={onOpenCart} style={{width:"100%",background:"linear-gradient(135deg,#F5A623,#D4891A)",border:"none",borderRadius:16,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",boxShadow:"0 8px 32px rgba(245,166,35,.4)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{background:"rgba(0,0,0,.2)",borderRadius:8,padding:"4px 9px",fontWeight:800,fontSize:13,color:"#fff"}}>{cartCount}</span>
              <span style={{fontWeight:700,fontSize:14,color:"#080A0F",fontFamily:"Outfit,sans-serif"}}>Voir le panier</span>
            </div>
            <span style={{fontWeight:800,fontSize:14,color:"#080A0F",fontFamily:"Outfit,sans-serif"}}>{fmt(cartTotal)}</span>
          </button>
        </div>
      )}
    </div>
  );
}

// PANIER
// ═══════════════════════════════════════════════════════════════════
function CartSheet({ session, cart, onCartChange, onClose, onOrder }) {
  const total = cart.reduce((s,i)=>s+i.qty*i.price,0);
  const [mode, setMode]   = useState("sur_place"); // sur_place | orange_money
  const [loading, setLoading] = useState(false);
  const resto = session.restaurants?.find(r=>r.id===session.activeRestaurantId);

  const changeQty = (id, delta) => {
    const newCart = cart.map(c=>c.id===id?{...c,qty:Math.max(0,c.qty+delta)}:c).filter(c=>c.qty>0);
    onCartChange(newCart);
  };

  const doOrder = async () => {
    if(!cart.length) return;
    setLoading(true);
    try {
      await onOrder({ cart, mode, total });
      onClose();
    } catch(e){ alert("Erreur : "+e.message); }
    setLoading(false);
  };

  return (
    <Sheet title="🛒 Mon panier" onClose={onClose}>
      {cart.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 0",color:"#5A6170"}}>
          <div style={{fontSize:40,marginBottom:12}}>🛒</div>
          <div>Votre panier est vide</div>
        </div>
      ) : (
        <>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {cart.map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,background:"#171A24",borderRadius:12,padding:"12px 14px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#F0F2F8"}}>{item.name}</div>
                  <div style={{fontSize:12,color:"#F5A623",fontWeight:700,marginTop:2}}>{fmt(item.price)}</div>
                </div>
                <div className="qty-pill">
                  <button className="qty-btn" onClick={()=>changeQty(item.id,-1)}>−</button>
                  <span className="qty-val">{item.qty}</span>
                  <button className="qty-btn" onClick={()=>changeQty(item.id,1)}>+</button>
                </div>
                <div style={{fontWeight:800,fontSize:13,color:"#F0F2F8",minWidth:70,textAlign:"right"}}>{fmt(item.qty*item.price)}</div>
              </div>
            ))}
          </div>

          {/* Total */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.2)",borderRadius:12,padding:"14px 16px",marginBottom:20}}>
            <span style={{fontWeight:700,color:"#9CA3B0"}}>Total</span>
            <span style={{fontFamily:"Outfit,sans-serif",fontWeight:900,fontSize:20,color:"#F5A623"}}>{fmt(total)}</span>
          </div>

          {/* Mode paiement */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:"#5A6170",textTransform:"uppercase",letterSpacing:".6px",marginBottom:10}}>Mode de paiement</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{id:"sur_place",icon:"💵",label:"Sur place"},{id:"orange_money",icon:"📱",label:"Orange Money"}].map(m=>(
                <button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"14px 10px",borderRadius:14,border:mode===m.id?"2px solid #F5A623":"1px solid rgba(255,255,255,.1)",background:mode===m.id?"rgba(245,166,35,.12)":"rgba(255,255,255,.04)",color:mode===m.id?"#F5A623":"#9CA3B0",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .2s"}}>
                  <span style={{fontSize:22}}>{m.icon}</span>
                  {m.label}
                </button>
              ))}
            </div>
          </div>

          {/* Orange Money info */}
          {mode==="orange_money" && resto?.orange_money_numero && (
            <div style={{background:"rgba(255,140,0,.08)",border:"1px solid rgba(255,140,0,.25)",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:700,color:"#F5A623",marginBottom:8,fontSize:14}}>📱 Envoyez le montant exact</div>
              <div style={{fontSize:13,color:"#9CA3B0",lineHeight:1.7}}>
                Numéro Orange Money :<br/>
                <strong style={{color:"#F0F2F8",fontSize:20,fontFamily:"Outfit,sans-serif",letterSpacing:"0.05em"}}>{resto.orange_money_numero}</strong><br/>
                <strong style={{color:"#F5A623"}}>{fmt(total)}</strong><br/>
                <span style={{fontSize:12,color:"#5A6170"}}>Votre commande sera validée après confirmation du paiement.</span>
              </div>
            </div>
          )}

          <button className="c-btn" onClick={doOrder} disabled={loading}>
            {loading?"Envoi en cours...":"✅ Commander — "+fmt(total)}
          </button>
        </>
      )}
    </Sheet>
  );
}

// SUIVI COMMANDE
// ═══════════════════════════════════════════════════════════════════
function OrderTracker({ orderId, onClose }) {
  const [order, setOrder] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try {
      const rows = await sb.get("orders", `id=eq.${orderId}&select=id,statut,total,created_at,motif_rejet,client_nom,mode_paiement_client,order_items(name,quantity,price)`);
      if(rows?.length) setOrder(rows[0]);
    } catch(e){}
    setLoading(false);
  }, [orderId]);

  useEffect(() => {
    load();
    // Polling toutes les 12 secondes
    const interval = setInterval(load, 12000);
    return () => clearInterval(interval);
  }, [load]);

  const STEPS = [
    {id:"en_attente_validation",label:"En attente de validation",icon:"⏳"},
    {id:"acceptee",label:"Commande acceptée",icon:"✅"},
    {id:"en_preparation",label:"En préparation",icon:"👨‍🍳"},
    {id:"prete",label:"Commande prête !",icon:"🎉"},
  ];

  const statutIdx = order ? STEPS.findIndex(s=>s.id===order.statut) : -1;
  const isRejetee = order?.statut==="rejetee";

  return (
    <Sheet title="Suivi commande" onClose={onClose}>
      {loading && <Loader msg="Chargement..."/>}
      {!loading && order && (
        <>
          <div style={{background:"#171A24",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
            <div style={{fontSize:11,color:"#5A6170",marginBottom:4}}>Commande #{order.id?.slice(-6).toUpperCase()}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <StatusBadge statut={order.statut}/>
              <span style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:17,color:"#F5A623"}}>{fmt(order.total)}</span>
            </div>
          </div>

          {isRejetee ? (
            <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:700,color:"#EF4444",marginBottom:4}}>❌ Commande refusée</div>
              {order.motif_rejet && <div style={{fontSize:13,color:"#9CA3B0"}}>{order.motif_rejet}</div>}
            </div>
          ) : (
            <div className="timeline" style={{marginBottom:20,paddingLeft:4}}>
              {STEPS.map((step,i)=>{
                const done   = statutIdx > i;
                const active = statutIdx === i;
                const future = statutIdx < i;
                return (
                  <div key={step.id} className="tl-step">
                    <div className="tl-dot">
                      <div className="tl-circle" style={{background:done?"#22C55E":active?"#F5A623":"rgba(255,255,255,.08)",color:done||active?"#fff":"#5A6170",boxShadow:active?"0 0 12px rgba(245,166,35,.4)":"none",transition:"all .4s"}}>
                        {done?"✓":step.icon}
                      </div>
                      {i<STEPS.length-1 && <div className="tl-line" style={{background:done?"#22C55E33":"rgba(255,255,255,.08)"}}/>}
                    </div>
                    <div className="tl-content">
                      <div style={{fontWeight:active?700:500,color:future?"#5A6170":done?"#22C55E":active?"#F5A623":"#F0F2F8",fontSize:14,transition:"color .3s"}}>{step.label}</div>
                      {active && <div style={{fontSize:11,color:"#9CA3B0",marginTop:2,animation:"pulse 2s infinite"}}>En cours...</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Détail articles */}
          {order.order_items?.length>0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#5A6170",textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Articles commandés</div>
              {order.order_items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                  <span style={{fontSize:13,color:"#9CA3B0"}}>{item.quantity}× {item.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#F0F2F8"}}>{fmt((item.price||0)*item.quantity)}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </Sheet>
  );
}

// ═══════════════════════════════════════════════════════════════════
// HISTORIQUE DES COMMANDES
// ═══════════════════════════════════════════════════════════════════
function HistoriqueScreen({ session }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tracked, setTracked] = useState(null);

  const rid = session.activeRestaurantId;

  useEffect(()=>{
    setLoading(true);
    sb.get("orders",`restaurant_id=eq.${encodeURIComponent(rid)}&client_id=eq.${encodeURIComponent(session.client.id)}&order=created_at.desc&limit=50&select=id,statut,total,created_at,motif_rejet,mode_paiement_client`)
      .then(r=>{ setOrders(r||[]); setLoading(false); })
      .catch(()=>setLoading(false));
  },[rid,session.client.id]);

  return (
    <div style={{padding:"20px 16px",paddingBottom:100}}>
      <h2 style={{fontFamily:"Outfit,sans-serif",fontSize:22,fontWeight:800,marginBottom:20,color:"#F0F2F8"}}>Mes commandes</h2>
      {loading && <Loader/>}
      {!loading && orders.length===0 && (
        <div style={{textAlign:"center",padding:"48px 20px",color:"#5A6170"}}>
          <div style={{fontSize:44,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Aucune commande</div>
          <div style={{fontSize:13}}>Vos commandes apparaîtront ici</div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {orders.map(o=>(
          <div key={o.id} onClick={()=>setTracked(o.id)} className="c-card" style={{cursor:"pointer",transition:"border-color .2s",animation:"fadeUp .3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"#F0F2F8"}}>Commande #{o.id?.slice(-6).toUpperCase()}</div>
                <div style={{fontSize:11,color:"#5A6170",marginTop:3}}>{fmtDate(o.created_at)}</div>
              </div>
              <span style={{fontFamily:"Outfit,sans-serif",fontWeight:800,color:"#F5A623",fontSize:15}}>{fmt(o.total)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <StatusBadge statut={o.statut}/>
              <span style={{fontSize:11,color:"#5A6170"}}>{o.mode_paiement_client==="orange_money"?"📱 Orange Money":"💵 Sur place"}</span>
            </div>
            {o.motif_rejet && <div style={{marginTop:10,fontSize:12,color:"#EF4444",background:"rgba(239,68,68,.08)",borderRadius:8,padding:"6px 10px"}}>Motif : {o.motif_rejet}</div>}
          </div>
        ))}
      </div>
      {tracked && <OrderTracker orderId={tracked} onClose={()=>setTracked(null)}/>}
    </div>
  );
}

// NOTIFICATIONS

      .then(r=>{ setNotifs(r||[]); setLoading(false); })
      .catch(()=>{ setNotifs([]); setLoading(false); });
  },[session.client.id]);

  return (
    <div style={{padding:"20px 16px",paddingBottom:100}}>
      <h2 style={{fontFamily:"Outfit,sans-serif",fontSize:22,fontWeight:800,marginBottom:20,color:"#F0F2F8"}}>Notifications</h2>
      {loading && <Loader/>}
      {!loading && notifs.length===0 && (
        <div style={{textAlign:"center",padding:"48px 20px",color:"#5A6170"}}>
          <div style={{fontSize:44,marginBottom:12}}>🔔</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Aucune notification</div>
          <div style={{fontSize:13}}>Vous serez notifié ici lorsque vos commandes changent de statut</div>
        </div>
      )}

        {notifs.map(n=>(

            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:22,flexShrink:0}}>{n.icon||"🔔"}</span>

                <div style={{fontWeight:n.lu?500:700,fontSize:14,color:"#F0F2F8",marginBottom:3}}>{n.titre||n.message}</div>

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// PROFIL
// ═══════════════════════════════════════════════════════════════════
function ProfilScreen({ session, onLogout, onSessionUpdate }) {
  const { client, restaurants, affiliations } = session;
  const [showAffiliate, setShowAffiliate] = useState(false);
  const [toast, setToast] = useState(null);

  const nomComplet = `${client.prenom||""} ${client.nom||""}`.trim();

  const handleNewAffi = (resto) => {
    const newSession = {
      ...session,
      affiliations:[...affiliations,{restaurant_id:resto.id,affiliated_at:new Date().toISOString(),actif:true}],
      restaurants:[...(restaurants||[]),resto]
    };
    setSession(newSession);
    onSessionUpdate(newSession);
    setShowAffiliate(false);
    setToast("Affilié à "+resto.nom+" !");
  };

  return (
    <div style={{padding:"20px 16px",paddingBottom:100}}>
      <h2 style={{fontFamily:"Outfit,sans-serif",fontSize:22,fontWeight:800,marginBottom:20,color:"#F0F2F8"}}>Mon profil</h2>

      {/* Avatar + Infos */}
      <div style={{background:"linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05))",border:"1px solid rgba(245,166,35,.2)",borderRadius:20,padding:"22px",marginBottom:20,textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:22,background:"linear-gradient(135deg,#F5A623,#D4891A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px",boxShadow:"0 4px 20px rgba(245,166,35,.3)"}}>
          {(client.prenom||"U").charAt(0).toUpperCase()}
        </div>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:20,color:"#F0F2F8"}}>{nomComplet}</div>
        <div style={{fontSize:13,color:"#9CA3B0",marginTop:5}}>📞 {client.telephone}</div>
      </div>

      {/* Mes restaurants */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:16,color:"#F0F2F8"}}>🍽 Mes restaurants</div>
          <button onClick={()=>setShowAffiliate(true)} style={{background:"rgba(245,166,35,.12)",border:"1px solid rgba(245,166,35,.25)",borderRadius:10,padding:"6px 12px",cursor:"pointer",color:"#F5A623",fontWeight:700,fontSize:12}}>+ Ajouter</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {(restaurants||[]).map(r=>(
            <div key={r.id} className="c-card" style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#F5A623,#D4891A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🍽</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#F0F2F8",fontSize:14}}>{r.nom}</div>
                <div style={{fontSize:11,color:"#5A6170",marginTop:2}}>Code : {r.code}</div>
              </div>
              {r.id===session.activeRestaurantId && <span className="c-badge" style={{background:"rgba(34,197,94,.15)",color:"#22C55E"}}>Actif</span>}
            </div>
          ))}
        </div>
      </div>

      {/* Déconnexion */}
      <button className="c-btn c-btn-danger" onClick={onLogout} style={{width:"100%",padding:"14px",borderRadius:14,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>
        🚪 Se déconnecter
      </button>

      {showAffiliate && <AffiliationSheet session={session} onDone={handleNewAffi} onClose={()=>setShowAffiliate(false)}/>}
      {toast && <Toast msg={toast} icon="✅" onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// RESTAURANT SWITCHER (header bar)
// ═══════════════════════════════════════════════════════════════════
function RestaurantSwitcher({ session, onSwitch }) {
  const { restaurants=[], activeRestaurantId } = session;
  if(restaurants.length<=1) return null;
  return (
    <div className="resto-scroll" style={{background:"#080A0F",borderBottom:"1px solid rgba(255,255,255,.06)",paddingTop:10,paddingBottom:10}}>
      {restaurants.map(r=>(
        <button key={r.id} onClick={()=>onSwitch(r.id)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,border:r.id===activeRestaurantId?"2px solid #F5A623":"1px solid rgba(255,255,255,.1)",background:r.id===activeRestaurantId?"rgba(245,166,35,.12)":"rgba(255,255,255,.05)",color:r.id===activeRestaurantId?"#F5A623":"#9CA3B0",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
          🍽 {r.nom}
        </button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP PRINCIPALE
// ═══════════════════════════════════════════════════════════════════
function MainApp({ session: initialSession, onLogout }) {
  const [session, setSessionState] = useState(initialSession);
  const [tab, setTab]   = useState("menu");
  const [cart, setCart] = useState(() => getCart(initialSession.activeRestaurantId));
  const [showCart, setShowCart] = useState(false);
  const [tracked, setTracked]   = useState(null);
  const [toast, setToast]        = useState(null);
  const [notifCount, setNotifCount] = useState(0);

  const rid = session.activeRestaurantId;

  // Recharger panier quand restaurant change
  const handleSwitch = (newRid) => {
    saveCart(rid, cart);
    const newSession = { ...session, activeRestaurantId: newRid };
    setSession(newSession);
    setSessionState(newSession);
    setCart(getCart(newRid));
    setTab("menu");
  };

  const handleSessionUpdate = (newSession) => {
    setSessionState(newSession);
  };

  const handleCartChange = (newCart) => {
    setCart(newCart);
    saveCart(rid, newCart);
  };

  const handleOrder = async ({ cart, mode, total }) => {
    const client = session.client;
    const nomComplet = `${client.prenom||""} ${client.nom||""}`.trim();
    // Créer la commande dans la table orders
    const orderBody = {
      id: uid(),
      restaurant_id: rid,
      type: "emporter",
      statut: "en_attente_validation",
      total: total,
      client_id: client.id,
      is_client_order: true,
      client_nom: nomComplet,
      client_telephone: client.telephone,
      mode_paiement_client: mode,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };
    // Insérer la commande
    const orderRows = await sb.post("orders", orderBody);
    const orderId = orderRows?.[0]?.id || orderBody.id;
    // Insérer les articles
    const items = cart.map(c=>({
      id: uid(),
      order_id: orderId,
      restaurant_id: rid,
      name: c.name,
      quantity: c.qty,
      price: c.price,
      service_id: c.service_id||null,
    }));
    await sb.post("order_items", items);
    // Vider le panier
    handleCartChange([]);
    setToast("✅ Commande envoyée !");
    setTracked(orderId);
    setTab("historique");
  };

  // Compter les notifs non lues
  useEffect(()=>{
    sb.get("client_notifications",`client_id=eq.${encodeURIComponent(session.client.id)}&lu=eq.false&select=id`)
      .then(r=>setNotifCount(r?.length||0))
      .catch(()=>{});
    const i = setInterval(()=>{
      sb.get("client_notifications",`client_id=eq.${encodeURIComponent(session.client.id)}&lu=eq.false&select=id`)
        .then(r=>setNotifCount(r?.length||0)).catch(()=>{});
    },30000);
    return ()=>clearInterval(i);
  },[session.client.id]);

  const cartCount = cart.reduce((s,i)=>s+i.qty,0);

  const TABS = [
    { id:"menu",       icon:"🍽",  label:"Menu"          },
    { id:"historique", icon:"📋",  label:"Commandes"     },
    { id:"notifs",     icon:"🔔",  label:"Notifs",  badge:notifCount },
    { id:"profil",     icon:"👤",  label:"Profil"        },
  ];

  return (
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#080A0F",display:"flex",flexDirection:"column",position:"relative"}}>
      <style>{GLOBAL_CSS}</style>
      <OfflineBanner/>

      {/* Restaurant switcher si plusieurs */}
      {session.restaurants?.length>1 && (
        <RestaurantSwitcher session={session} onSwitch={handleSwitch}/>
      )}

      {/* Contenu */}
      <div style={{flex:1,overflowY:"auto",paddingTop:4}}>
        {tab==="menu"       && <MenuScreen session={session} cart={cart} onCartChange={handleCartChange} onOpenCart={()=>setShowCart(true)}/>}
        {tab==="historique" && <HistoriqueScreen session={session}/>}
        {tab==="notifs"     && <NotificationsScreen session={session}/>}
        {tab==="profil"     && <ProfilScreen session={session} onLogout={onLogout} onSessionUpdate={handleSessionUpdate}/>}
      </div>

      {/* Nav bar */}
      <nav className="nav-bar">
        {TABS.map(t=>{
          const active = tab===t.id;
          return (
            <button key={t.id} className="nav-item" onClick={()=>setTab(t.id)}>
              <div className="nav-icon" style={{background:active?"rgba(245,166,35,.18)":"transparent"}}>
                <span style={{fontSize:20}}>{t.icon}</span>
              </div>
              <span className="nav-label" style={{color:active?"#F5A623":"#5A6170"}}>{t.label}</span>
              {t.badge>0 && <span className="nav-badge">{t.badge}</span>}
            </button>
          );
        })}
      </nav>

      {/* Cart sheet */}
      {showCart && (
        <CartSheet session={session} cart={cart} onCartChange={handleCartChange} onClose={()=>setShowCart(false)} onOrder={handleOrder}/>
      )}

      {/* Order tracker */}
      {tracked && <OrderTracker orderId={tracked} onClose={()=>setTracked(null)}/>}

      {/* Toast */}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [splash,   setSplash]   = useState(true);
  const [session,  setSessionSt] = useState(null);
  const [loading,  setLoading]  = useState(true);

  useEffect(() => {
    const stored = getSession();
    setSessionSt(stored);
    setLoading(false);
  }, []);

  const handleAuth = (s) => {
    setSession(s);
    setSessionSt(s);
  };

  const handleLogout = () => {
    clearSession();
    setSessionSt(null);
  };

  if(splash) return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#080A0F"}}><Spinner/></div>;
  if(!session) return <AuthPage onAuth={handleAuth}/>;
  return <MainApp session={session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Service Worker -->
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`
const CACHE="nxsc-v1";
const ASSETS=["/client.html","/"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{}))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("supabase.co")||e.request.url.includes("onesignal"))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("/client.html"))));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
