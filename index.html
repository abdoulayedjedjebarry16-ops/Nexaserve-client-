const ONESIGNAL_APP_ID = "d9cb7f25-a664-4046-b721-b2ea6f3f8235";
const initOneSignal = (clientId) => {
  try {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async (OneSignal) => {
      await OneSignal.init({ appId: ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin: true });
      if (clientId) {
        await OneSignal.login(clientId);
      }
    });
  } catch(e) { console.warn("OneSignal init failed", e); }
};

// ── SUPABASE CONFIG ────────────────────────────────────────────────
const SB_URL = "https://apqsldtzosodkunftixw.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwcXNsZHR6b3NvZGt1bmZ0aXh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NjQzMzgsImV4cCI6MjA5MzE0MDMzOH0.NU5q6jRt7LY3FcgwANwXc_ADtp8bPjhpNAkiATcX93o";

const sb = {
  h: { "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY },
  async get(table, params="") {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: this.h });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method:"POST", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, filter, body) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
      method:"PATCH", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async rpc(fn, body) {
    const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
      method:"POST", headers:{...this.h,"Prefer":"return=representation"}, body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

const fmtShort = iso=> { try { return new Date(iso.includes("T")?iso:iso+"T00:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}); } catch(e){return iso;} };

// ── COMPOSANTS UI ──────────────────────────────────────────────────

function Toast({ msg, icon="✓", onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast"><span>{icon}</span>{msg}</div>;
}

function Spinner({ size=32, color="#F5A623" }) {
  return <div style={{width:size,height:size,border:`3px solid ${color}33`,borderTopColor:color,borderRadius:"50%",animation:"spin .8s linear infinite"}}/>;
}

function Loader({ msg="Chargement..." }) {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",gap:14}}>
      <Spinner size={36}/>
      <div style={{fontSize:13,color:"#5A6170"}}>{msg}</div>
    </div>
  );
}

function Sheet({ title, onClose, children, noPad=false }) {
  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{title}</span>
          <button className="sheet-close" onClick={onClose}>✕</button>
        </div>
        <div style={noPad?{}:{padding:"18px 20px 8px"}}>{children}</div>
      </div>
    </div>
  );
}

function Field({ label, children, error }) {
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#5A6170",marginBottom:7,textTransform:"uppercase",letterSpacing:".6px"}}>{label}</label>
      {children}
      {error && <div style={{fontSize:12,color:"#EF4444",marginTop:5}}>{error}</div>}
    </div>
  );
}

function InpEye({ value, onChange, placeholder }) {
  const [show, setShow] = useState(false);
  return (
    <div style={{position:"relative"}}>
      <input className={`c-inp c-inp-pr`} type={show?"text":"password"} value={value} onChange={onChange} placeholder={placeholder||"••••••••"}/>
      <button onClick={()=>setShow(s=>!s)} type="button" style={{position:"absolute",right:0,top:0,height:"100%",width:46,background:"none",border:"none",cursor:"pointer",color:"#5A6170",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{show?"🙈":"👁"}</button>
    </div>
  );
}

function StatusBadge({ statut }) {
  const s = STATUTS[statut] || { label:statut, color:"#9CA3B0", bg:"rgba(156,163,175,.12)", icon:"•" };
  return <span className="c-badge" style={{background:s.bg,color:s.color}}>{s.icon} {s.label}</span>;
}

function OfflineBanner() {
  const [offline, setOffline] = useState(!navigator.onLine);
  useEffect(() => {
    const on=()=>setOffline(false), off=()=>setOffline(true);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return ()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);
  if(!offline) return null;
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#dc2626",color:"#fff",textAlign:"center",padding:"8px 16px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      <span>📵</span> Hors ligne — Vérifiez votre connexion
    </div>
  );
}

const NxsField = ({label, children}) => (
  <div className="nxs-field">
    <label className="nxs-label">{label}</label>
    {children}
  </div>
);

// Questions secrètes proposées à l'inscription
const QUESTIONS_SECRETES = [
  "Quel est le prénom de votre mère ?",
  "Quel est le nom de votre école primaire ?",
  "Quel est le nom de votre premier animal de compagnie ?",
  "Dans quelle ville êtes-vous né(e) ?",
  "Quel est le surnom de votre meilleur(e) ami(e) d'enfance ?",
];

// ═══════════════════════════════════════════════════════════════════
// AUTH — INSCRIPTION / CONNEXION
// ═══════════════════════════════════════════════════════════════════
function AuthPage({ onAuth }) {
  const [step, setStep]     = useState("login"); // login | register | forgot_pass
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]       = useState({type:"",text:""});

  // ── Login
  const [lTel,  setLTel]  = useState("");
  const [lPass, setLPass] = useState("");
  const [showLP, setShowLP] = useState(false);

  // ── Register
  const [rPrenom, setRPrenom] = useState("");
  const [rNom,    setRNom]    = useState("");
  const [rTel,    setRTel]    = useState("");
  const [rPass,   setRPass]   = useState("");
  const [rPass2,  setRPass2]  = useState("");
  const [showRP,  setShowRP]  = useState(false);
  const [rCode,   setRCode]   = useState(URL_CODE || "");
  const [rQ,      setRQ]      = useState(QUESTIONS_SECRETES[0]);
  const [rA,      setRA]      = useState("");

  // ── Mot de passe oublié
  const [fpTel,   setFpTel]   = useState("");
  const [fpQ,     setFpQ]     = useState("");
  const [fpA,     setFpA]     = useState("");
  const [fpNew,   setFpNew]   = useState("");
  const [fpNew2,  setFpNew2]  = useState("");
  const [fpClient,setFpClient]= useState(null);
  const [fpStep,  setFpStep]  = useState(1); // 1=tel, 2=question, 3=nouveau mdp

  const err  = t => setMsg({type:"error",   text:t});
  const succ = t => setMsg({type:"success",  text:t});
  const clr  = () => setMsg({type:"",text:""});

  const renderMsg = () => msg.text ? (
    <div className={msg.type==="error"?"nxs-error":"nxs-success"}>
      {msg.type==="error"?"⚠️ ":"✓ "}{msg.text}
    </div>
  ) : null;

  // ── CONNEXION ──────────────────────────────────────────────────
  const doLogin = async () => {
    if(!lTel||!lPass){ err("Téléphone et mot de passe requis."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("clients", `telephone=eq.${encodeURIComponent(lTel.trim())}&select=id,nom,prenom,telephone`);
      if(!rows?.length){ err("Numéro de téléphone introuvable."); setLoading(false); return; }
      const client = rows[0];
      const pwRows = await sb.get("clients", `id=eq.${client.id}&password_hash=eq.${encodeURIComponent(lPass)}&select=id`);
      if(!pwRows?.length){ err("Mot de passe incorrect."); setLoading(false); return; }
      const affs = await sb.get("client_affiliations", `client_id=eq.${client.id}&actif=eq.true&select=restaurant_id,affiliated_at`);
      if(!affs?.length){ err("Aucun restaurant associé. Inscrivez-vous avec un code restaurant."); setLoading(false); return; }
      const rids = affs.map(a=>a.restaurant_id);
      const restos = await sb.get("restaurants", `id=in.(${rids.join(",")})&select=id,code,nom,plan,orange_money_numero`);
      const session = { client, affiliations:affs, restaurants:restos, activeRestaurantId:restos[0]?.id };
      setSession(session);
      initOneSignal(client.id);
      onAuth(session);
    } catch(e){ err("Erreur de connexion. Vérifiez votre connexion internet."); }
    setLoading(false);
  };

  // ── INSCRIPTION ────────────────────────────────────────────────
  const doRegister = async () => {
    if(!rPrenom||!rNom||!rTel||!rPass||!rCode||!rA){ err("Tous les champs sont obligatoires."); return; }
    if(rPass!==rPass2){ err("Les mots de passe ne correspondent pas."); return; }
    if(rPass.length<4){ err("Mot de passe trop court (min. 4 caractères)."); return; }
    if(!rCode.trim().toUpperCase().startsWith("NXS")){ err("Code restaurant invalide (format NXS-XXXX)."); return; }
    setLoading(true); clr();
    try {
      const restos = await sb.get("restaurants", `code=eq.${encodeURIComponent(rCode.trim().toUpperCase())}&select=id,nom,plan,statut_abo,date_expiration,orange_money_numero`);
      if(!restos?.length){ err("Code restaurant introuvable. Vérifiez le code NXS-XXXX."); setLoading(false); return; }
      const resto = restos[0];
      const existing = await sb.get("clients", `telephone=eq.${encodeURIComponent(rTel.trim())}&select=id`);
      if(existing?.length){ err("Ce numéro de téléphone est déjà utilisé."); setLoading(false); return; }
      const clientBody = {
        id:uid(), nom:rNom.trim(), prenom:rPrenom.trim(), telephone:rTel.trim(),
        password_hash:rPass, secret_question:rQ, secret_answer:rA.toLowerCase().trim(),
        created_at:new Date().toISOString()
      };
      const clients = await sb.post("clients", clientBody);
      const client = clients[0] || clientBody;
      await sb.post("client_affiliations", { id:uid(), client_id:client.id, restaurant_id:resto.id, affiliated_at:new Date().toISOString(), actif:true });
      const session = { client, affiliations:[{restaurant_id:resto.id,affiliated_at:new Date().toISOString(),actif:true}], restaurants:[resto], activeRestaurantId:resto.id };
      setSession(session);
      initOneSignal(client.id);
      onAuth(session);
    } catch(e){ err("Erreur : "+e.message); }
    setLoading(false);
  };

  // ── MOT DE PASSE OUBLIÉ — étape 1 : trouver le client par téléphone
  const fpFind = async () => {
    if(!fpTel){ err("Numéro de téléphone requis."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("clients", `telephone=eq.${encodeURIComponent(fpTel.trim())}&select=id,nom,prenom,secret_question`);
      if(!rows?.length){ err("Aucun compte trouvé avec ce numéro."); setLoading(false); return; }
      const client = rows[0];
      if(!client.secret_question){ err("Question secrète non configurée pour ce compte."); setLoading(false); return; }
      setFpClient(client);
      setFpQ(client.secret_question);
      setFpStep(2);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  // ── MOT DE PASSE OUBLIÉ — étape 2 : vérifier la réponse secrète
  const fpVerify = async () => {
    if(!fpA){ err("Veuillez répondre à la question secrète."); return; }
    setLoading(true); clr();
    try {
      const rows = await sb.get("clients", `id=eq.${encodeURIComponent(fpClient.id)}&select=secret_answer`);
      const correct = rows?.[0]?.secret_answer || "";
      if(fpA.toLowerCase().trim() !== correct.toLowerCase().trim()){ err("Réponse incorrecte."); setLoading(false); return; }
      setFpStep(3);
    } catch(e){ err("Erreur réseau."); }
    setLoading(false);
  };

  // ── MOT DE PASSE OUBLIÉ — étape 3 : nouveau mot de passe
  const fpReset = async () => {
    if(!fpNew||fpNew!==fpNew2){ err("Les mots de passe ne correspondent pas."); return; }
    if(fpNew.length<4){ err("Mot de passe trop court (minimum 4 caractères)."); return; }
    setLoading(true); clr();
    try {
      await sb.patch("clients", `id=eq.${fpClient.id}`, {password_hash:fpNew});
      succ("Mot de passe réinitialisé avec succès !");
      setTimeout(()=>{ setStep("login"); setFpStep(1); setFpTel(""); setFpA(""); setFpNew(""); setFpNew2(""); clr(); }, 2000);
    } catch(e){ err("Erreur lors de la réinitialisation."); }
    setLoading(false);
  };

  return (
    <>
      <style>{NXS_CSS}</style>
      <div className="nxs-auth">
        <OfflineBanner/>

        {/* Logo */}
        <div className="nxs-logo">
          <NxsLogo size={80} mb={14}/>
          <h1>NexaServe</h1>
          <p>Client</p>
        </div>

        {/* ── CONNEXION ── */}
        {step==="login" && (
          <div className="nxs-card">
            <h2 className="nxs-card-title">Connexion</h2>
            <p className="nxs-card-sub">Connectez-vous avec votre numéro de téléphone</p>
            {renderMsg()}
            <NxsField label="Numéro de téléphone">
              <input className="nxs-inp" value={lTel} onChange={e=>{setLTel(e.target.value);clr();}}
                onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="6XX XX XX XX" type="tel" inputMode="tel"/>
            </NxsField>
            <NxsField label="Mot de passe">
              <div className="nxs-inp-wrap">
                <input className="nxs-inp nxs-inp-pr" type={showLP?"text":"password"} value={lPass}
                  onChange={e=>{setLPass(e.target.value);clr();}}
                  onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="••••••••"/>
                <button className="nxs-inp-eye" onClick={()=>setShowLP(s=>!s)} type="button">{showLP?"🙈":"👁️"}</button>
              </div>
            </NxsField>
            <button className="nxs-btn" onClick={doLogin} disabled={loading}>
              {loading?"Connexion en cours...":"Se connecter"}
            </button>
            <div className="nxs-links">
              <button className="nxs-link" onClick={()=>{setStep("forgot_pass");setFpStep(1);clr();}}>Mot de passe oublié ?</button>
              <span className="nxs-sep">·</span>
              <button className="nxs-link" onClick={()=>{setStep("register");clr();}}>Créer un compte</button>
            </div>
          </div>
        )}

        {/* ── INSCRIPTION ── */}
        {step==="register" && (
          <div className="nxs-card">
            <button className="nxs-back" onClick={()=>{setStep("login");clr();}}>← Retour</button>
            <h2 className="nxs-card-title">Créer un compte</h2>
            <p className="nxs-card-sub">Inscrivez-vous avec le code de votre restaurant</p>
            {renderMsg()}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <NxsField label="Prénom">
                <input className="nxs-inp" value={rPrenom} onChange={e=>{setRPrenom(e.target.value);clr();}} placeholder="Prénom"/>
              </NxsField>
              <NxsField label="Nom">
                <input className="nxs-inp" value={rNom} onChange={e=>{setRNom(e.target.value);clr();}} placeholder="Nom"/>
              </NxsField>
            </div>
            <NxsField label="Numéro de téléphone">
              <input className="nxs-inp" value={rTel} onChange={e=>{setRTel(e.target.value);clr();}} placeholder="6XX XX XX XX" type="tel" inputMode="tel"/>
            </NxsField>
            <NxsField label="Mot de passe">
              <div className="nxs-inp-wrap">
                <input className="nxs-inp nxs-inp-pr" type={showRP?"text":"password"} value={rPass}
                  onChange={e=>{setRPass(e.target.value);clr();}} placeholder="••••••••"/>
                <button className="nxs-inp-eye" onClick={()=>setShowRP(s=>!s)} type="button">{showRP?"🙈":"👁️"}</button>
              </div>
            </NxsField>
            <NxsField label="Confirmer le mot de passe">
              <input className="nxs-inp" type="password" value={rPass2} onChange={e=>{setRPass2(e.target.value);clr();}} placeholder="••••••••"/>
            </NxsField>
            <NxsField label="Code restaurant (obligatoire)">
              <input className="nxs-inp" value={rCode} onChange={e=>{setRCode(e.target.value.toUpperCase());clr();}}
                placeholder="NXS-XXXX" style={{letterSpacing:"0.1em",fontWeight:700}}/>
            </NxsField>
            <div className="nxs-info">
              💡 Le code NXS-XXXX vous est fourni par votre restaurant. Scannez le QR code ou saisissez-le manuellement.
            </div>
            {/* Question secrète */}
            <NxsField label="Question secrète (pour récupérer votre mot de passe)">
              <select className="nxs-inp" value={rQ} onChange={e=>{setRQ(e.target.value);clr();}} style={{cursor:"pointer"}}>
                {QUESTIONS_SECRETES.map(q=><option key={q} value={q}>{q}</option>)}
              </select>
            </NxsField>
            <NxsField label="Votre réponse secrète">
              <input className="nxs-inp" value={rA} onChange={e=>{setRA(e.target.value);clr();}}
                placeholder="Réponse confidentielle..." autoCapitalize="none" autoCorrect="off"/>
            </NxsField>
            <div className="nxs-info" style={{background:"rgba(239,68,68,.07)",borderColor:"rgba(239,68,68,.2)"}}>
              🔒 Gardez votre réponse secrète en sécurité. Elle servira uniquement à récupérer votre mot de passe.
            </div>
            <button className="nxs-btn" onClick={doRegister} disabled={loading}>
              {loading?"Création du compte...":"Créer mon compte"}
            </button>
            <div className="nxs-links">
              <button className="nxs-link" onClick={()=>{setStep("login");clr();}}>Déjà inscrit ? Se connecter</button>
            </div>
          </div>
        )}

        {/* ── MOT DE PASSE OUBLIÉ ── */}
        {step==="forgot_pass" && (
          <div className="nxs-card">
            <button className="nxs-back" onClick={()=>{setStep("login");clr();}}>← Retour</button>
            <h2 className="nxs-card-title">Mot de passe oublié</h2>
            {renderMsg()}

            {fpStep===1 && <>
              <p className="nxs-card-sub">Saisissez votre numéro de téléphone pour retrouver votre compte.</p>
              <NxsField label="Numéro de téléphone">
                <input className="nxs-inp" value={fpTel} onChange={e=>{setFpTel(e.target.value);clr();}}
                  placeholder="6XX XX XX XX" type="tel" inputMode="tel"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpFind} disabled={loading}>{loading?"Recherche...":"Continuer"}</button>
            </>}

            {fpStep===2 && <>
              <div className="nxs-info">
                📋 Bonjour <strong>{fpClient?.prenom} {fpClient?.nom}</strong>. Répondez à votre question secrète.
              </div>
              <NxsField label="Question secrète">
                <input className="nxs-inp" value={fpQ} readOnly style={{color:"#F5A623",fontWeight:600}}/>
              </NxsField>
              <NxsField label="Votre réponse">
                <input className="nxs-inp" value={fpA} onChange={e=>{setFpA(e.target.value);clr();}}
                  placeholder="Votre réponse..." autoCapitalize="none"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpVerify} disabled={loading}>{loading?"Vérification...":"Vérifier"}</button>
            </>}

            {fpStep===3 && <>
              <p className="nxs-card-sub">Choisissez un nouveau mot de passe pour <strong style={{color:"#F5A623"}}>{fpClient?.prenom} {fpClient?.nom}</strong>.</p>
              <NxsField label="Nouveau mot de passe">
                <input className="nxs-inp" type="password" value={fpNew} onChange={e=>{setFpNew(e.target.value);clr();}} placeholder="••••••••"/>
              </NxsField>
              <NxsField label="Confirmer le mot de passe">
                <input className="nxs-inp" type="password" value={fpNew2} onChange={e=>{setFpNew2(e.target.value);clr();}} placeholder="••••••••"/>
              </NxsField>
              <button className="nxs-btn" onClick={fpReset} disabled={loading}>{loading?"Réinitialisation...":"Enregistrer"}</button>
            </>}
          </div>
        )}

        <div className="nxs-footer">© 2026 NexaServe · Réseau privé restauration</div>
      </div>
    </>
  );
}

// AFFILIATION — Ajouter un restaurant
// ═══════════════════════════════════════════════════════════════════
function AffiliationSheet({ session, onDone, onClose }) {
  const [code, setCode]   = useState(URL_CODE||"");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]     = useState({type:"",text:""});

  const doAffiliate = async () => {
    if(!code.trim()){ setMsg({type:"error",text:"Code restaurant requis."}); return; }
    setLoading(true); setMsg({type:"",text:""});
    try {
      const restos = await sb.get("restaurants", `code=eq.${encodeURIComponent(code.trim().toUpperCase())}&select=id,nom,plan,orange_money_numero`);
      if(!restos?.length){ setMsg({type:"error",text:"Code restaurant introuvable."}); setLoading(false); return; }
      const resto = restos[0];
      // Vérifier si déjà affilié
      const existing = await sb.get("client_affiliations", `client_id=eq.${session.client.id}&restaurant_id=eq.${resto.id}&select=id,actif`);
      if(existing?.length) {
        if(existing[0].actif){ setMsg({type:"error",text:"Vous êtes déjà affilié à ce restaurant."}); setLoading(false); return; }
        // Réactiver
        await sb.patch("client_affiliations",`id=eq.${existing[0].id}`,{actif:true});
      } else {
        await sb.post("client_affiliations",{id:uid(),client_id:session.client.id,restaurant_id:resto.id,affiliated_at:new Date().toISOString(),actif:true});
      }
      onDone(resto);
    } catch(e){ setMsg({type:"error",text:e.message}); }
    setLoading(false);
  };

  return (
    <Sheet title="Rejoindre un restaurant" onClose={onClose}>
      {msg.text && <div style={{background:msg.type==="error"?"rgba(239,68,68,.1)":"rgba(34,197,94,.1)",border:`1px solid ${msg.type==="error"?"rgba(239,68,68,.3)":"rgba(34,197,94,.3)"}`,borderRadius:12,padding:"10px 14px",marginBottom:14,color:msg.type==="error"?"#EF4444":"#22C55E",fontSize:13}}>{msg.text}</div>}
      <Field label="Code restaurant">
        <input className="c-inp" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="NXS-XXXX" style={{letterSpacing:"0.1em",fontWeight:700}}/>
      </Field>
      <div style={{marginBottom:14}}>
        <button className="c-btn" onClick={doAffiliate} disabled={loading}>{loading?"Recherche...":"S'affilier"}</button>
      </div>
      <button className="c-btn c-btn-ghost" onClick={onClose}>Annuler</button>
    </Sheet>
  );
}

// MENU SCREEN
// ═══════════════════════════════════════════════════════════════════
function MenuScreen({ session, cart, onCartChange, onOpenCart }) {
  const [menu, setMenu]      = useState([]);
  const [categories, setCats] = useState([]);
  const [selCat, setSelCat]  = useState("all");
  const [loading, setLoading] = useState(true);
  const [search, setSearch]  = useState("");
  const [resto, setResto]    = useState(null);

  const rid = session.activeRestaurantId;

  useEffect(() => {
    if(!rid) return;
    setLoading(true);
    const r = session.restaurants?.find(r=>r.id===rid);
    setResto(r);
    // Colonnes réelles : nom, prix, categorie, desactive, image, service_id
    // Exclure explicitement le poste Chicha — seuls Cuisine et Bar sont visibles
    sb.get("menu_items", `restaurant_id=eq.${encodeURIComponent(rid)}&desactive=eq.false&poste=neq.Chicha&order=categorie.asc,nom.asc`)
      .then(items => {
        const normalized = (items||[])
          .filter(p => !p.poste || p.poste.toLowerCase() !== "chicha")
          .map(p=>({
            id:         p.id,
            name:       p.nom,
            price:      p.prix,
            category:   p.categorie,
            image_url:  p.image,
            service_id: p.service_id,
            poste:      p.poste,
          }));
        setMenu(normalized);
        const cats = [...new Set(normalized.map(i=>i.category).filter(Boolean))];
        setCats(cats);
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  }, [rid]);

  const filtered = useMemo(() => menu.filter(item => {
    const matchCat = selCat==="all" || item.category===selCat;
    const matchSearch = !search || (item.name||"").toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  }), [menu,selCat,search]);

  const cartCount = cart.reduce((s,i)=>s+i.qty,0);

        {/* Catégories */}
        {categories.length>0 && (
          <div className="resto-scroll" style={{margin:"0 -20px",padding:"0 20px 14px"}}>
            {[{id:"all",l:"Tout"},...categories.map(c=>({id:c,l:c}))].map(cat=>(
              <button key={cat.id} onClick={()=>setSelCat(cat.id)} style={{flexShrink:0,padding:"7px 16px",borderRadius:20,border:selCat===cat.id?"none":"1px solid rgba(255,255,255,.1)",background:selCat===cat.id?"#F5A623":"rgba(255,255,255,.05)",color:selCat===cat.id?"#080A0F":"#9CA3B0",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>

      {/* Menu items */}

// PANIER
// ═══════════════════════════════════════════════════════════════════
function CartSheet({ session, cart, onCartChange, onClose, onOrder }) {
  const total = cart.reduce((s,i)=>s+i.qty*i.price,0);
  const [mode, setMode]   = useState("sur_place"); // sur_place | orange_money
  const [loading, setLoading] = useState(false);
  const resto = session.restaurants?.find(r=>r.id===session.activeRestaurantId);

  const changeQty = (id, delta) => {
    const newCart = cart.map(c=>c.id===id?{...c,qty:Math.max(0,c.qty+delta)}:c).filter(c=>c.qty>0);
    onCartChange(newCart);
  };

  const doOrder = async () => {
    if(!cart.length) return;
    setLoading(true);
    try {
      await onOrder({ cart, mode, total });
      onClose();
    } catch(e){ alert("Erreur : "+e.message); }
    setLoading(false);
  };

  return (
    <Sheet title="🛒 Mon panier" onClose={onClose}>
      {cart.length===0 ? (
        <div style={{textAlign:"center",padding:"32px 0",color:"#5A6170"}}>
          <div style={{fontSize:40,marginBottom:12}}>🛒</div>
          <div>Votre panier est vide</div>
        </div>
      ) : (
        <>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {cart.map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,background:"#171A24",borderRadius:12,padding:"12px 14px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#F0F2F8"}}>{item.name}</div>
                  <div style={{fontSize:12,color:"#F5A623",fontWeight:700,marginTop:2}}>{fmt(item.price)}</div>
                </div>
                <div className="qty-pill">
                  <button className="qty-btn" onClick={()=>changeQty(item.id,-1)}>−</button>
                  <span className="qty-val">{item.qty}</span>
                  <button className="qty-btn" onClick={()=>changeQty(item.id,1)}>+</button>
                </div>
                <div style={{fontWeight:800,fontSize:13,color:"#F0F2F8",minWidth:70,textAlign:"right"}}>{fmt(item.qty*item.price)}</div>
              </div>
            ))}
          </div>

          {/* Total */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(245,166,35,.08)",border:"1px solid rgba(245,166,35,.2)",borderRadius:12,padding:"14px 16px",marginBottom:20}}>
            <span style={{fontWeight:700,color:"#9CA3B0"}}>Total</span>
            <span style={{fontFamily:"Outfit,sans-serif",fontWeight:900,fontSize:20,color:"#F5A623"}}>{fmt(total)}</span>
          </div>

          {/* Mode paiement */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:"#5A6170",textTransform:"uppercase",letterSpacing:".6px",marginBottom:10}}>Mode de paiement</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{id:"sur_place",icon:"💵",label:"Sur place"},{id:"orange_money",icon:"📱",label:"Orange Money"}].map(m=>(
                <button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"14px 10px",borderRadius:14,border:mode===m.id?"2px solid #F5A623":"1px solid rgba(255,255,255,.1)",background:mode===m.id?"rgba(245,166,35,.12)":"rgba(255,255,255,.04)",color:mode===m.id?"#F5A623":"#9CA3B0",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .2s"}}>
                  <span style={{fontSize:22}}>{m.icon}</span>
                  {m.label}
                </button>
              ))}
            </div>
          </div>

          {/* Orange Money info */}
          {mode==="orange_money" && resto?.orange_money_numero && (
            <div style={{background:"rgba(255,140,0,.08)",border:"1px solid rgba(255,140,0,.25)",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:700,color:"#F5A623",marginBottom:8,fontSize:14}}>📱 Envoyez le montant exact</div>
              <div style={{fontSize:13,color:"#9CA3B0",lineHeight:1.7}}>
                Numéro Orange Money :<br/>
                <strong style={{color:"#F0F2F8",fontSize:20,fontFamily:"Outfit,sans-serif",letterSpacing:"0.05em"}}>{resto.orange_money_numero}</strong><br/>
                <strong style={{color:"#F5A623"}}>{fmt(total)}</strong><br/>
                <span style={{fontSize:12,color:"#5A6170"}}>Votre commande sera validée après confirmation du paiement.</span>
              </div>
            </div>
          )}

          <button className="c-btn" onClick={doOrder} disabled={loading}>
            {loading?"Envoi en cours...":"✅ Commander — "+fmt(total)}
          </button>
        </>
      )}
    </Sheet>
  );
}

// SUIVI COMMANDE
// ═══════════════════════════════════════════════════════════════════
function OrderTracker({ orderId, onClose }) {
  const [order, setOrder] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    try {
      const rows = await sb.get("orders", `id=eq.${orderId}&select=id,statut,total,created_at,motif_rejet,client_nom,mode_paiement_client,order_items(name,quantity,price)`);
      if(rows?.length) setOrder(rows[0]);
    } catch(e){}
    setLoading(false);
  }, [orderId]);

  useEffect(() => {
    load();
    // Polling toutes les 12 secondes
    const interval = setInterval(load, 12000);
    return () => clearInterval(interval);
  }, [load]);

  const STEPS = [
    {id:"en_attente_validation",label:"En attente de validation",icon:"⏳"},
    {id:"acceptee",label:"Commande acceptée",icon:"✅"},
    {id:"en_preparation",label:"En préparation",icon:"👨‍🍳"},
    {id:"prete",label:"Commande prête !",icon:"🎉"},
  ];

  const statutIdx = order ? STEPS.findIndex(s=>s.id===order.statut) : -1;
  const isRejetee = order?.statut==="rejetee";

  return (
    <Sheet title="Suivi commande" onClose={onClose}>
      {loading && <Loader msg="Chargement..."/>}
      {!loading && order && (
        <>
          <div style={{background:"#171A24",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
            <div style={{fontSize:11,color:"#5A6170",marginBottom:4}}>Commande #{order.id?.slice(-6).toUpperCase()}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <StatusBadge statut={order.statut}/>
              <span style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:17,color:"#F5A623"}}>{fmt(order.total)}</span>
            </div>
          </div>

          {isRejetee ? (
            <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontWeight:700,color:"#EF4444",marginBottom:4}}>❌ Commande refusée</div>
              {order.motif_rejet && <div style={{fontSize:13,color:"#9CA3B0"}}>{order.motif_rejet}</div>}
            </div>
          ) : (
            <div className="timeline" style={{marginBottom:20,paddingLeft:4}}>
              {STEPS.map((step,i)=>{
                const done   = statutIdx > i;
                const active = statutIdx === i;
                const future = statutIdx < i;
                return (
                  <div key={step.id} className="tl-step">
                    <div className="tl-dot">
                      <div className="tl-circle" style={{background:done?"#22C55E":active?"#F5A623":"rgba(255,255,255,.08)",color:done||active?"#fff":"#5A6170",boxShadow:active?"0 0 12px rgba(245,166,35,.4)":"none",transition:"all .4s"}}>
                        {done?"✓":step.icon}
                      </div>
                      {i<STEPS.length-1 && <div className="tl-line" style={{background:done?"#22C55E33":"rgba(255,255,255,.08)"}}/>}
                    </div>
                    <div className="tl-content">
                      <div style={{fontWeight:active?700:500,color:future?"#5A6170":done?"#22C55E":active?"#F5A623":"#F0F2F8",fontSize:14,transition:"color .3s"}}>{step.label}</div>
                      {active && <div style={{fontSize:11,color:"#9CA3B0",marginTop:2,animation:"pulse 2s infinite"}}>En cours...</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Détail articles */}
          {order.order_items?.length>0 && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#5A6170",textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Articles commandés</div>
              {order.order_items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                  <span style={{fontSize:13,color:"#9CA3B0"}}>{item.quantity}× {item.name}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#F0F2F8"}}>{fmt((item.price||0)*item.quantity)}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </Sheet>
  );
}

    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const data = ev.target.result;
      localStorage.setItem(PHOTO_KEY, data);
      setPhoto(data);
      setToast("Photo de profil mise à jour !");
    };
    reader.readAsDataURL(file);
  };

  // ── Modifier infos
  const doEditInfo = async () => {
    if(!ePrenom||!eNom||!eTel){ setEMsg({type:"error",text:"Tous les champs sont obligatoires."}); return; }
    setELoading(true); setEMsg({type:"",text:""});
    try {
      await sb.patch("clients", `id=eq.${client.id}`, {prenom:ePrenom.trim(),nom:eNom.trim(),telephone:eTel.trim()});
      const newClient = {...client,prenom:ePrenom.trim(),nom:eNom.trim(),telephone:eTel.trim()};
      const newSession = {...session,client:newClient};
      setSession(newSession);
      onSessionUpdate(newSession);
      setEMsg({type:"success",text:"Informations mises à jour !"});
      setTimeout(()=>setSheet(null),1500);
    } catch(e){ setEMsg({type:"error",text:"Erreur : "+e.message}); }
    setELoading(false);
  };

  // ── Changer mot de passe
  const doChangePass = async () => {
    if(!pOld||!pNew||!pNew2){ setPMsg({type:"error",text:"Tous les champs sont obligatoires."}); return; }
    if(pNew!==pNew2){ setPMsg({type:"error",text:"Les nouveaux mots de passe ne correspondent pas."}); return; }
    if(pNew.length<4){ setPMsg({type:"error",text:"Mot de passe trop court (min. 4 caractères)."}); return; }
    setPLoading(true); setPMsg({type:"",text:""});
    try {
      const rows = await sb.get("clients",`id=eq.${client.id}&password_hash=eq.${encodeURIComponent(pOld)}&select=id`);
      if(!rows?.length){ setPMsg({type:"error",text:"Mot de passe actuel incorrect."}); setPLoading(false); return; }
      await sb.patch("clients",`id=eq.${client.id}`,{password_hash:pNew});
      setPMsg({type:"success",text:"Mot de passe modifié avec succès !"});
      setTimeout(()=>{ setSheet(null); setPOld(""); setPNew(""); setPNew2(""); },1500);
    } catch(e){ setPMsg({type:"error",text:"Erreur : "+e.message}); }
    setPLoading(false);
  };

  // ── Supprimer compte
  const doDelete = async () => {
    if(!dPass){ setDMsg({type:"error",text:"Mot de passe requis pour confirmer."}); return; }
    setDLoading(true); setDMsg({type:"",text:""});
    try {
      const rows = await sb.get("clients",`id=eq.${client.id}&password_hash=eq.${encodeURIComponent(dPass)}&select=id`);
      if(!rows?.length){ setDMsg({type:"error",text:"Mot de passe incorrect."}); setDLoading(false); return; }
      // Désactiver affiliations
      await sb.patch("client_affiliations",`client_id=eq.${client.id}`,{actif:false});
      // Supprimer les données locales
      localStorage.removeItem(PHOTO_KEY);
      clearSession();
      onLogout();
    } catch(e){ setDMsg({type:"error",text:"Erreur : "+e.message}); }
    setDLoading(false);
  };

  const handleNewAffi = (resto) => {
    const newSession = {
      ...session,
      affiliations:[...affiliations,{restaurant_id:resto.id,affiliated_at:new Date().toISOString(),actif:true}],
      restaurants:[...(restaurants||[]),resto]
    };
    setSession(newSession);
    onSessionUpdate(newSession);
    setShowAffiliate(false);
    setToast("Affilié à "+resto.nom+" !");
  };

  const inputRef = useRef();

  return (
    <div style={{padding:"20px 16px",paddingBottom:100}}>
      <h2 style={{fontFamily:"Outfit,sans-serif",fontSize:22,fontWeight:800,marginBottom:20,color:"#F0F2F8"}}>Mon profil</h2>

      {/* Avatar + Infos */}
      <div style={{background:"linear-gradient(135deg,rgba(245,166,35,.15),rgba(245,166,35,.05))",border:"1px solid rgba(245,166,35,.2)",borderRadius:20,padding:"22px",marginBottom:20,textAlign:"center"}}>
        {/* Photo cliquable */}
        <div style={{position:"relative",width:80,height:80,margin:"0 auto 14px",cursor:"pointer"}} onClick={()=>inputRef.current?.click()}>
          {photo
            ? <img src={photo} alt="profil" style={{width:80,height:80,borderRadius:24,objectFit:"cover",border:"3px solid #F5A623"}}/>
            : <div style={{width:80,height:80,borderRadius:24,background:"linear-gradient(135deg,#F5A623,#D4891A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,boxShadow:"0 4px 20px rgba(245,166,35,.3)"}}>
                {(client.prenom||"U").charAt(0).toUpperCase()}
              </div>
          }
          <div style={{position:"absolute",bottom:-4,right:-4,width:26,height:26,borderRadius:"50%",background:"#F5A623",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,border:"2px solid #080A0F"}}>📷</div>
        </div>
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
        <div style={{fontFamily:"Outfit,sans-serif",fontWeight:800,fontSize:20,color:"#F0F2F8"}}>{nomComplet}</div>
        <div style={{fontSize:13,color:"#9CA3B0",marginTop:5}}>📞 {client.telephone}</div>
        <div style={{fontSize:11,color:"#5A6170",marginTop:4}}>Appuyez sur la photo pour la modifier</div>
      </div>

      {/* Actions profil */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        <button onClick={()=>setSheet("edit")} className="c-card" style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer",border:"1px solid rgba(255,255,255,.07)",textAlign:"left",width:"100%",background:"#0F1118"}}>
          <span style={{fontSize:22}}>✏️</span>
          <div style={{flex:1}}><div style={{fontWeight:700,color:"#F0F2F8",fontSize:14}}>Modifier mes informations</div><div style={{fontSize:12,color:"#5A6170",marginTop:2}}>Nom, prénom, téléphone</div></div>
          <span style={{color:"#5A6170",fontSize:16}}>›</span>
        </button>
        <button onClick={()=>setSheet("password")} className="c-card" style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer",border:"1px solid rgba(255,255,255,.07)",textAlign:"left",width:"100%",background:"#0F1118"}}>
          <span style={{fontSize:22}}>🔑</span>
          <div style={{flex:1}}><div style={{fontWeight:700,color:"#F0F2F8",fontSize:14}}>Changer le mot de passe</div><div style={{fontSize:12,color:"#5A6170",marginTop:2}}>Sécurisez votre compte</div></div>
          <span style={{color:"#5A6170",fontSize:16}}>›</span>
        </button>
      </div>

      {/* Mes restaurants */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"Outfit,sans-serif",fontWeight:700,fontSize:16,color:"#F0F2F8"}}>🍽 Mes restaurants</div>
          <button onClick={()=>setShowAffiliate(true)} style={{background:"rgba(245,166,35,.12)",border:"1px solid rgba(245,166,35,.25)",borderRadius:10,padding:"6px 12px",cursor:"pointer",color:"#F5A623",fontWeight:700,fontSize:12}}>+ Ajouter</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {(restaurants||[]).map(r=>(
            <div key={r.id} className="c-card" style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#F5A623,#D4891A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🍽</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#F0F2F8",fontSize:14}}>{r.nom}</div>
                <div style={{fontSize:11,color:"#5A6170",marginTop:2}}>Code : {r.code}</div>
              </div>
              {r.id===session.activeRestaurantId && <span className="c-badge" style={{background:"rgba(34,197,94,.15)",color:"#22C55E"}}>Actif</span>}
            </div>
          ))}
        </div>
      </div>

      {/* Déconnexion */}
      <button className="c-btn c-btn-danger" onClick={onLogout} style={{width:"100%",padding:"14px",borderRadius:14,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Outfit,sans-serif",marginBottom:14}}>
        🚪 Se déconnecter
      </button>

      {/* Zone danger */}
      <div style={{border:"1px solid rgba(239,68,68,.25)",borderRadius:16,padding:"16px",background:"rgba(239,68,68,.04)"}}>
        <div style={{fontWeight:700,color:"#EF4444",fontSize:13,marginBottom:6}}>⚠️ Zone de danger</div>
        <div style={{fontSize:12,color:"#9CA3B0",marginBottom:12,lineHeight:1.5}}>La suppression de votre compte est irréversible. Toutes vos données seront perdues.</div>
        <button onClick={()=>setSheet("delete")} style={{width:"100%",padding:"12px",borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#EF4444",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          🗑 Supprimer mon compte
        </button>
      </div>

      {/* ── Sheet : Modifier infos */}
      {sheet==="edit" && (
        <Sheet title="Modifier mes informations" onClose={()=>setSheet(null)}>
          <MsgBox msg={eMsg}/>
          <Field label="Prénom"><input className="c-inp" value={ePrenom} onChange={e=>setEPrenom(e.target.value)} placeholder="Prénom"/></Field>
          <Field label="Nom"><input className="c-inp" value={eNom} onChange={e=>setENom(e.target.value)} placeholder="Nom"/></Field>
          <Field label="Téléphone"><input className="c-inp" value={eTel} onChange={e=>setETel(e.target.value)} placeholder="6XX XX XX XX" type="tel"/></Field>
          <button className="c-btn" onClick={doEditInfo} disabled={eLoading} style={{marginBottom:10}}>{eLoading?"Enregistrement...":"Enregistrer"}</button>
          <button className="c-btn c-btn-ghost" onClick={()=>setSheet(null)}>Annuler</button>
        </Sheet>
      )}

      {/* ── Sheet : Changer mot de passe */}
      {sheet==="password" && (
        <Sheet title="Changer le mot de passe" onClose={()=>setSheet(null)}>
          <MsgBox msg={pMsg}/>
          <Field label="Mot de passe actuel"><input className="c-inp" type="password" value={pOld} onChange={e=>setPOld(e.target.value)} placeholder="••••••••"/></Field>
          <Field label="Nouveau mot de passe"><input className="c-inp" type="password" value={pNew} onChange={e=>setPNew(e.target.value)} placeholder="••••••••"/></Field>
          <Field label="Confirmer le nouveau mot de passe"><input className="c-inp" type="password" value={pNew2} onChange={e=>setPNew2(e.target.value)} placeholder="••••••••"/></Field>
          <button className="c-btn" onClick={doChangePass} disabled={pLoading} style={{marginBottom:10}}>{pLoading?"Modification...":"Modifier le mot de passe"}</button>
          <button className="c-btn c-btn-ghost" onClick={()=>setSheet(null)}>Annuler</button>
        </Sheet>
      )}

      {/* ── Sheet : Supprimer compte */}
      {sheet==="delete" && (
        <Sheet title="Supprimer mon compte" onClose={()=>setSheet(null)}>
          <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:13,color:"#EF4444",lineHeight:1.5}}>
            ⚠️ Cette action est <strong>irréversible</strong>. Toutes vos données et commandes seront supprimées.
          </div>
          <MsgBox msg={dMsg}/>
          <Field label="Confirmez avec votre mot de passe"><input className="c-inp" type="password" value={dPass} onChange={e=>setDPass(e.target.value)} placeholder="Votre mot de passe actuel"/></Field>
          <button onClick={doDelete} disabled={dLoading} style={{width:"100%",padding:"14px",borderRadius:14,background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:10,fontFamily:"Outfit,sans-serif"}}>
            {dLoading?"Suppression...":"🗑 Confirmer la suppression"}
          </button>
          <button className="c-btn c-btn-ghost" onClick={()=>setSheet(null)}>Annuler</button>
        </Sheet>
      )}

      {showAffiliate && <AffiliationSheet session={session} onDone={handleNewAffi} onClose={()=>setShowAffiliate(false)}/>}
      {toast && <Toast msg={toast} icon="✅" onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// RESTAURANT SWITCHER (header bar)
// ═══════════════════════════════════════════════════════════════════
function RestaurantSwitcher({ session, onSwitch }) {
  const { restaurants=[], activeRestaurantId } = session;
  if(restaurants.length<=1) return null;
  return (
    <div className="resto-scroll" style={{background:"#080A0F",borderBottom:"1px solid rgba(255,255,255,.06)",paddingTop:10,paddingBottom:10}}>
      {restaurants.map(r=>(
        <button key={r.id} onClick={()=>onSwitch(r.id)} style={{flexShrink:0,padding:"8px 16px",borderRadius:20,border:r.id===activeRestaurantId?"2px solid #F5A623":"1px solid rgba(255,255,255,.1)",background:r.id===activeRestaurantId?"rgba(245,166,35,.12)":"rgba(255,255,255,.05)",color:r.id===activeRestaurantId?"#F5A623":"#9CA3B0",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
          🍽 {r.nom}
        </button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP PRINCIPALE
// ═══════════════════════════════════════════════════════════════════
function MainApp({ session: initialSession, onLogout }) {
  const [session, setSessionState] = useState(initialSession);
  const [tab, setTab]   = useState("menu");
  const [cart, setCart] = useState(() => getCart(initialSession.activeRestaurantId));
  const [showCart, setShowCart] = useState(false);
  const [tracked, setTracked]   = useState(null);
  const [toast, setToast]        = useState(null);
  const [notifCount, setNotifCount] = useState(0);

  const rid = session.activeRestaurantId;

  // Recharger panier quand restaurant change
  const handleSwitch = (newRid) => {
    saveCart(rid, cart);
    const newSession = { ...session, activeRestaurantId: newRid };
    setSession(newSession);
    setSessionState(newSession);
    setCart(getCart(newRid));
    setTab("menu");
  };

  const handleSessionUpdate = (newSession) => {
    setSessionState(newSession);
  };

  const handleCartChange = (newCart) => {
    setCart(newCart);
    saveCart(rid, newCart);
  };

  const handleOrder = async ({ cart, mode, total }) => {
    const client = session.client;
    const nomComplet = `${client.prenom||""} ${client.nom||""}`.trim();
    // Créer la commande dans la table orders
    const orderBody = {
      id: uid(),
      restaurant_id: rid,
      type: "emporter",
      statut: "en_attente_validation",
      total: total,
      client_id: client.id,
      is_client_order: true,
      client_nom: nomComplet,
      client_telephone: client.telephone,
      mode_paiement_client: mode,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };
    // Insérer la commande
    const orderRows = await sb.post("orders", orderBody);
    const orderId = orderRows?.[0]?.id || orderBody.id;
    // Insérer les articles
    const items = cart.map(c=>({
      id: uid(),
      order_id: orderId,
      restaurant_id: rid,
      name: c.name,
      quantity: c.qty,
      price: c.price,
      service_id: c.service_id||null,
    }));
    await sb.post("order_items", items);
    // Vider le panier
    handleCartChange([]);
    setToast("✅ Commande envoyée !");
    setTracked(orderId);
    setTab("historique");
  };

  // Compter les notifs non lues
  useEffect(()=>{
    sb.get("client_notifications",`client_id=eq.${encodeURIComponent(session.client.id)}&lu=eq.false&select=id`)
      .then(r=>setNotifCount(r?.length||0))
      .catch(()=>{});
    const i = setInterval(()=>{
      sb.get("client_notifications",`client_id=eq.${encodeURIComponent(session.client.id)}&lu=eq.false&select=id`)
        .then(r=>setNotifCount(r?.length||0)).catch(()=>{});
    },30000);
    return ()=>clearInterval(i);
  },[session.client.id]);

  const cartCount = cart.reduce((s,i)=>s+i.qty,0);

  const TABS = [
    { id:"menu",       icon:"🍽",  label:"Menu"          },
    { id:"historique", icon:"📋",  label:"Commandes"     },
    { id:"notifs",     icon:"🔔",  label:"Notifs",  badge:notifCount },
    { id:"profil",     icon:"👤",  label:"Profil"        },
  ];

  return (
    <div style={{maxWidth:500,margin:"0 auto",minHeight:"100vh",background:"#080A0F",display:"flex",flexDirection:"column",position:"relative"}}>
      <style>{GLOBAL_CSS}</style>
      <OfflineBanner/>

      {/* Restaurant switcher si plusieurs */}
      {session.restaurants?.length>1 && (
        <RestaurantSwitcher session={session} onSwitch={handleSwitch}/>
      )}

      {/* Contenu */}
      <div style={{flex:1,overflowY:"auto",paddingTop:4}}>
        {tab==="menu"       && <MenuScreen session={session} cart={cart} onCartChange={handleCartChange} onOpenCart={()=>setShowCart(true)}/>}
        {tab==="historique" && <HistoriqueScreen session={session}/>}
        {tab==="notifs"     && <NotificationsScreen session={session}/>}
        {tab==="profil"     && <ProfilScreen session={session} onLogout={onLogout} onSessionUpdate={handleSessionUpdate}/>}
      </div>

      {/* Nav bar */}
      <nav className="nav-bar">
        {TABS.map(t=>{
          const active = tab===t.id;
          return (
            <button key={t.id} className="nav-item" onClick={()=>setTab(t.id)}>
              <div className="nav-icon" style={{background:active?"rgba(245,166,35,.18)":"transparent"}}>
                <span style={{fontSize:20}}>{t.icon}</span>
              </div>
              <span className="nav-label" style={{color:active?"#F5A623":"#5A6170"}}>{t.label}</span>
              {t.badge>0 && <span className="nav-badge">{t.badge}</span>}
            </button>
          );
        })}
      </nav>

      {/* Cart sheet */}
      {showCart && (
        <CartSheet session={session} cart={cart} onCartChange={handleCartChange} onClose={()=>setShowCart(false)} onOrder={handleOrder}/>
      )}

      {/* Order tracker */}
      {tracked && <OrderTracker orderId={tracked} onClose={()=>setTracked(null)}/>}

      {/* Toast */}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [splash,   setSplash]   = useState(true);
  const [session,  setSessionSt] = useState(null);
  const [loading,  setLoading]  = useState(true);

  useEffect(() => {
    const stored = getSession();
    setSessionSt(stored);
    setLoading(false);
  }, []);

  const handleAuth = (s) => {
    setSession(s);
    setSessionSt(s);
  };

  const handleLogout = () => {
    clearSession();
    setSessionSt(null);
  };

  if(splash) return <SplashScreen onDone={()=>setSplash(false)}/>;
  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#080A0F"}}><Spinner/></div>;
  if(!session) return <AuthPage onAuth={handleAuth}/>;
  return <MainApp session={session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Service Worker -->
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`
const CACHE="nxsc-v1";
const ASSETS=["/client.html","/"];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{}))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("supabase.co")||e.request.url.includes("onesignal"))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match("/client.html"))));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
